{% load static %}

<h2 class="mb-4 text-info text-center">{{ page_title }}</h2>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">
            <form method="post"
                  hx-post="{{ form_action_url }}"
                  hx-target="#search-content"
                  hx-swap="innerHTML">

                {% csrf_token %}

                <div class="row mb-3">

                    <div class="col-auto">
                        <label for="inputSearch" class="visually-hidden">Пошук за категоріями: </label>
                        <input type="text"
                               name="search_query"
                               class="form-control border-info"
                               id="inputSearch"
                               placeholder="Оберіть назву в таблиці..."
                               value="{{ word_search|default:'' }}"
                               disabled
                        >
                    </div>

                    <div class="col-auto">
                        {% if word_search %}
                        <button type="submit" class="btn btn-primary mb-3">Знайти</button>
                        {% else %}
                        <button type="submit" class="btn btn-light mb-3" disabled>Знайти</button>
                        {% endif %}

                    </div>
                </div>

                {% for key, pharm in pharmacy.items %}
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="{{ key }}" checked>
                    <label class="form-check-label text-info" for="{{ key }}">
                        {{ pharm }}
                    </label>
                </div>
                {% endfor %}

            </form>
        </div>
    </div>
</div>

<div class="search-content" id="search-content">
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-body">
                {% include 'block_table.html' %}
            </div>
        </div>
    </div>
</div>
